app = "agent-link-monitor"
primary_region = "sin"

[build]

[deploy]
  strategy = "immediate"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[processes]
  app = "npm start"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

