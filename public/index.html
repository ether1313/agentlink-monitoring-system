<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NS Domain Link Monitoring</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>Link Status Control Panel</h1>
        <p class="subtitle">Main dashboard for tracking link health.</p>
      </header>

      <section id="down-alert" class="alert hidden">
        <strong>Alert:</strong> One or more agent links are down.
      </section>

      <section class="stats">
        <div class="card">
          <h3>Total Links</h3>
          <p id="total-links">0</p>
        </div>
        <div class="card">
          <h3>Healthy</h3>
          <p id="healthy-links">0</p>
        </div>
        <div class="card">
          <h3>Down</h3>
          <p id="down-links">0</p>
        </div>
        <div class="card">
          <h3>Warning</h3>
          <p id="warning-links">0</p>
        </div>
        <div class="card">
          <h3>Unknown</h3>
          <p id="unknown-links">0</p>
        </div>
      </section>

      <section class="form-section">
        <h2>Add Link</h2>
        <form id="add-link-form">
          <label>
            URLs (one per line)
            <textarea
              id="new-urls"
              rows="5"
              placeholder="https://example.com/a&#10;https://example.com/b&#10;https://example.com/c"
              required
            ></textarea>
          </label>
          <label>
            Group
            <select id="new-category" required>
              <option value="">— Select group —</option>
              <option value="ipay9">ipay9</option>
              <option value="kingbet9">kingbet9</option>
              <option value="bigpay77">bigpay77</option>
              <option value="me99">me99</option>
              <option value="rolex9">rolex9</option>
              <option value="gucci9">gucci9</option>
              <option value="bybid9">bybid9</option>
              <option value="mrbean9">mrbean9</option>
              <option value="pkm9">pkm9</option>
              <option value="queen13">queen13</option>
              <option value="micky9">micky9</option>
              <option value="winnie777">winnie777</option>
              <option value="ace96au">ace96au</option>
            </select>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="add-remarks" />
            Add remarks
          </label>
          <div class="form-row remarks-row hidden" id="remarks-row">
            <label>
              Remarks
              <input type="text" id="new-note" placeholder="Campaign note" />
            </label>
          </div>
          <div class="form-row">
            <button type="submit">Add Links</button>
          </div>
        </form>
      </section>

      <section>
        <h2>Links</h2>
        <div class="filters">
          <label>
            Group
            <select id="filter-category">
              <option value="all">All</option>
              <option value="ipay9">ipay9</option>
              <option value="kingbet9">kingbet9</option>
              <option value="bigpay77">bigpay77</option>
              <option value="me99">me99</option>
              <option value="rolex9">rolex9</option>
              <option value="gucci9">gucci9</option>
              <option value="bybid9">bybid9</option>
              <option value="mrbean9">mrbean9</option>
              <option value="pkm9">pkm9</option>
              <option value="queen13">queen13</option>
              <option value="micky9">micky9</option>
              <option value="winnie777">winnie777</option>
              <option value="ace96au">ace96au</option>
            </select>
          </label>
          <label>
            Status
            <select id="filter-status">
              <option value="all">All</option>
              <option value="healthy">Healthy</option>
              <option value="down">Down</option>
              <option value="warning">Warning</option>
              <option value="unknown">Unknown</option>
            </select>
          </label>
        </div>
        <table>
          <thead>
            <tr>
              <th>URL</th>
              <th>Group</th>
              <th>Note</th>
              <th>Status</th>
              <th>Last Checked</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="links-table-body"></tbody>
        </table>
        <div class="pagination" id="links-pagination">
          <label for="page-size">
            Rows per page
            <select id="page-size">
              <option value="10" selected>10</option>
              <option value="20">20</option>
              <option value="50">50</option>
            </select>
          </label>
          <div class="pager">
            <button type="button" id="page-prev">Prev</button>
            <span class="pager-info" id="page-info">Page 1 / 1</span>
            <button type="button" id="page-next">Next</button>
          </div>
        </div>
      </section>
    </main>

    <audio id="alarm-audio" src="/alarm.mp3" preload="auto"></audio>
    <div id="toast" class="toast hidden" role="status" aria-live="polite">Marked as healthy</div>

    <div id="edit-link-modal" class="modal-overlay hidden" aria-hidden="true">
      <div class="modal">
        <h3>Edit Link</h3>
        <form id="edit-link-form">
          <input type="hidden" id="edit-link-id" />
          <label>
            URL
            <input type="url" id="edit-link-url" required />
          </label>
          <label>
            Group
            <select id="edit-link-category">
              <option value="">— Select group —</option>
              <option value="ipay9">ipay9</option>
              <option value="kingbet9">kingbet9</option>
              <option value="bigpay77">bigpay77</option>
              <option value="me99">me99</option>
              <option value="rolex9">rolex9</option>
              <option value="gucci9">gucci9</option>
              <option value="bybid9">bybid9</option>
              <option value="mrbean9">mrbean9</option>
              <option value="pkm9">pkm9</option>
              <option value="queen13">queen13</option>
              <option value="micky9">micky9</option>
              <option value="winnie777">winnie777</option>
              <option value="ace96au">ace96au</option>
            </select>
          </label>
          <label>
            Remarks
            <input type="text" id="edit-link-note" placeholder="Optional" />
          </label>
          <div class="modal-actions">
            <button type="button" id="edit-link-cancel">Cancel</button>
            <button type="submit">Save</button>
          </div>
        </form>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
